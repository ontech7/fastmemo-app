name: "publish"

on: workflow_dispatch

jobs:
  publish-tauri:
    permissions:
      contents: write
    environment: production
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest" # for Arm based macs (M1 and above).
            args: "--target aarch64-apple-darwin"
          - platform: "macos-15-intel" # for Intel based macs.
            args: "--target x86_64-apple-darwin"
          - platform: "ubuntu-22.04"
            args: ""
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Those targets are only used on macos runners so it's in an `if` to slightly speed up windows and linux builds.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04' # This must match the platform value defined above.
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install frontend dependencies
        run: yarn install

      - name: get version from package.json
        id: pkg_version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
        shell: bash

      - name: compose release body
        id: release_body
        shell: bash
        run: |
          set -eo pipefail

          # Extract latest version section (from first ## to next ## or EOF)
          extract_latest() {
            awk '/^## /{if(found) exit; found=1; next} found' "$1"
          }

          mobile_file="docs/CHANGELOG_MOBILE.md"
          desktop_file="docs/CHANGELOG_DESKTOP.md"

          mobile_section=""
          desktop_section=""

          if [ -s "$mobile_file" ]; then
            mobile_content=$(extract_latest "$mobile_file")
            if [ -n "$mobile_content" ]; then
              mobile_section="📱 Mobile"$'\n\n'"$mobile_content"
            fi
          fi

          if [ -s "$desktop_file" ]; then
            desktop_content=$(extract_latest "$desktop_file")
            if [ -n "$desktop_content" ]; then
              desktop_section="🖥 Desktop"$'\n\n'"$desktop_content"
            fi
          fi

          if [ -n "$mobile_section" ] && [ -n "$desktop_section" ]; then
            body="$mobile_section"$'\n\n'"$desktop_section"
          elif [ -n "$mobile_section" ]; then
            body="$mobile_section"
          elif [ -n "$desktop_section" ]; then
            body="$desktop_section"
          else
            body="Checkout GitHub latest release for more details."
          fi

          {
            echo "content<<EOF"
            echo "$body"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tauri signing
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          # App config
          EXPO_PUBLIC_ENV: ${{ env.EXPO_PUBLIC_ENV }}
          EXPO_PUBLIC_API_URL: ${{ env.EXPO_PUBLIC_API_URL }}
          # Sentry
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        with:
          tagName: v${{ steps.pkg_version.outputs.version }}
          releaseName: "v${{ steps.pkg_version.outputs.version }} (+ Desktop)"
          releaseBody: ${{ steps.release_body.outputs.content }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  reconstruct-latest-json:
    needs: publish-tauri
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: get tag from package.json
        id: pkg_version
        run: echo "version=$(jq -r '.version' package.json)" >> $GITHUB_OUTPUT

      - name: get updater version from tauri.conf.json
        id: tauri_version
        run: echo "version=$(jq -r '.package.version' src-tauri/tauri.conf.json)" >> $GITHUB_OUTPUT

      - name: extract desktop-only changelog
        id: desktop_notes
        run: |
          set -eo pipefail

          extract_latest() {
            awk '/^## /{if(found) exit; found=1; next} found' "$1"
          }

          desktop_file="docs/CHANGELOG_DESKTOP.md"
          notes=""

          if [ -s "$desktop_file" ]; then
            notes=$(extract_latest "$desktop_file")
          fi

          if [ -z "$notes" ]; then
            notes="Checkout GitHub latest release for more details."
          fi

          {
            echo "content<<EOF"
            echo "$notes"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: reconstruct latest.json from release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DESKTOP_NOTES: ${{ steps.desktop_notes.outputs.content }}
        run: |
          set -eo pipefail
          tag="v${{ steps.pkg_version.outputs.version }}"
          version="${{ steps.tauri_version.outputs.version }}"

          # Fetch release metadata and assets
          pub_date=$(gh release view "$tag" --json publishedAt -q '.publishedAt')
          assets_json=$(gh release view "$tag" --json assets -q '.assets')

          # Download all updater signature files
          mkdir -p /tmp/sigs
          gh release download "$tag" -p "*.sig" -D /tmp/sigs 2>/dev/null || true

          # Identify updater artifacts per platform
          mac_arm_name=$(echo "$assets_json" | jq -r '
            [.[] | select(.name | endswith(".app.tar.gz"))
                 | select(.name | contains("x64") | not)]
            | .[0].name // empty')
          mac_arm_url=$(echo "$assets_json" | jq -r '
            [.[] | select(.name | endswith(".app.tar.gz"))
                 | select(.name | contains("x64") | not)]
            | .[0].url // empty')

          mac_intel_name=$(echo "$assets_json" | jq -r '
            [.[] | select(.name | endswith(".app.tar.gz"))
                 | select(.name | contains("x64"))]
            | .[0].name // empty')
          mac_intel_url=$(echo "$assets_json" | jq -r '
            [.[] | select(.name | endswith(".app.tar.gz"))
                 | select(.name | contains("x64"))]
            | .[0].url // empty')

          linux_name=$(echo "$assets_json" | jq -r '
            [.[] | select(.name | endswith(".AppImage.tar.gz"))]
            | .[0].name // empty')
          linux_url=$(echo "$assets_json" | jq -r '
            [.[] | select(.name | endswith(".AppImage.tar.gz"))]
            | .[0].url // empty')

          windows_msi_name=$(echo "$assets_json" | jq -r '
            [.[] | select(.name | endswith(".msi.zip"))]
            | .[0].name // empty')
          windows_msi_url=$(echo "$assets_json" | jq -r '
            [.[] | select(.name | endswith(".msi.zip"))]
            | .[0].url // empty')

          windows_nsis_name=$(echo "$assets_json" | jq -r '
            [.[] | select(.name | endswith(".nsis.zip"))]
            | .[0].name // empty')
          windows_nsis_url=$(echo "$assets_json" | jq -r '
            [.[] | select(.name | endswith(".nsis.zip"))]
            | .[0].url // empty')

          # Build platforms JSON object
          platforms="{}"

          add_platform() {
            local key="$1" name="$2" url="$3"
            [ -z "$name" ] && return
            [ -z "$url" ] && return
            local sig_file="/tmp/sigs/${name}.sig"
            [ -f "$sig_file" ] || return
            local sig
            sig=$(cat "$sig_file")
            platforms=$(echo "$platforms" | jq \
              --arg key "$key" --arg sig "$sig" --arg url "$url" \
              '.[$key] = {signature: $sig, url: $url}')
          }

          add_platform "darwin-aarch64"          "$mac_arm_name"      "$mac_arm_url"
          add_platform "darwin-aarch64-app"      "$mac_arm_name"      "$mac_arm_url"
          add_platform "darwin-x86_64"           "$mac_intel_name"    "$mac_intel_url"
          add_platform "darwin-x86_64-app"       "$mac_intel_name"    "$mac_intel_url"
          add_platform "linux-x86_64"            "$linux_name"        "$linux_url"
          add_platform "linux-x86_64-appimage"   "$linux_name"        "$linux_url"
          add_platform "windows-x86_64"          "$windows_msi_name"  "$windows_msi_url"
          add_platform "windows-x86_64-msi"      "$windows_msi_name"  "$windows_msi_url"
          add_platform "windows-x86_64-nsis"     "$windows_nsis_name" "$windows_nsis_url"

          # Construct the complete latest.json
          jq -n \
            --arg version "$version" \
            --arg notes "$DESKTOP_NOTES" \
            --arg pub_date "$pub_date" \
            --argjson platforms "$platforms" \
            '{version: $version, notes: $notes, pub_date: $pub_date, platforms: $platforms}' \
            > /tmp/latest.json

          echo "::group::Reconstructed latest.json"
          jq . /tmp/latest.json
          echo "::endgroup::"

          gh release upload "$tag" /tmp/latest.json --clobber
